<index.html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="BAJA PRO SERVICES - Licensed & Insured Contractors.">
    <title>BAJA PRO SERVICES | Licensed & Insured</title>
    <style>
        :root {
            --primary-blue: #1e40af;
            --dark-blue: #0f172a;
            --accent-green: #16a34a;
            --bg-light: #f8fafc;
            --border-color: #cbd5e1;
            --focus-color: #3b82f6;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, system-ui, sans-serif;
            background-color: var(--bg-light);
            color: #1e293b;
            line-height: 1.6;
        }

        /* --- HERO --- */
        .hero {
            width: 100%;
            height: 280px;
            background: linear-gradient(rgba(15, 23, 42, 0.7), rgba(15, 23, 42, 0.7)), url('hero.png');
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 8px;
            z-index: 100;
        }

        .lang-switch button {
            background: rgba(255, 255, 255, 0.9);
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 700;
            font-size: 12px;
            transition: var(--transition);
        }

        .lang-switch button.active {
            background: var(--primary-blue);
            color: white;
        }

        /* --- FORM CONTAINER --- */
        .container {
            width: 92%;
            max-width: 550px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            margin: -60px auto 40px;
            position: relative;
            z-index: 10;
        }

        .section-title {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--primary-blue);
            margin: 24px 0 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .section-title::after { content: ""; height: 1px; background: #e2e8f0; flex: 1; }

        .form-group { margin-bottom: 14px; }
        label { display: block; font-weight: 600; font-size: 14px; margin-bottom: 6px; color: #475569; }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 16px;
            transition: var(--transition);
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--focus-color);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* SERVICES GRID */
        .services-grid {
            max-height: 280px;
            overflow-y: auto;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 12px;
            background: #f8fafc;
        }

        .service-item {
            display: flex;
            align-items: center;
            padding: 8px;
            font-size: 14px;
            cursor: pointer;
            border-radius: 8px;
        }

        .service-item:hover { background: #eef2ff; }
        .service-item input { width: 18px; height: 18px; margin-right: 12px; accent-color: var(--primary-blue); }

        /* BUTTONS */
        .btn-group { display: flex; flex-direction: column; gap: 12px; margin-top: 20px; }
        .btn {
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            color: white;
            transition: var(--transition);
            text-transform: uppercase;
        }

        .btn-service { background: var(--dark-blue); }
        .btn-estimate { background: var(--accent-green); }
        .btn:hover { transform: translateY(-2px); opacity: 0.9; }

        /* --- CALL FAB --- */
        .call-fab {
            position: fixed;
            bottom: 25px;
            left: 25px;
            width: 60px;
            height: 60px;
            background-color: #2563eb;
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            z-index: 1000;
            text-decoration: none;
            transition: var(--transition);
        }
        .call-fab:hover { transform: scale(1.1); background-color: #1d4ed8; }

        .footer { text-align: center; font-size: 12px; color: #94a3b8; padding: 20px; }

        @media (max-width: 480px) {
            .container { padding: 20px; margin-top: -40px; }
        }
    </style>
</head>
<body>

<div class="hero">
    <div class="lang-switch">
        <button id="lang-en" class="active" onclick="setLang('en')">EN</button>
        <button id="lang-es" onclick="setLang('es')">ES</button>
    </div>
    <h2 style="color: white; letter-spacing: 2px;">BAJA PRO SERVICES</h2>
</div>

<a href="tel:6122198325" class="call-fab" title="Call Us">
    <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
</a>

<div class="container">
    <form id="serviceForm">
        <span class="section-title" id="t1"></span>
        
        <div class="form-group">
            <label for="name" id="nameLabel"></label>
            <input id="name" type="text" required>
        </div>

        <div class="form-group">
            <label for="phone" id="phoneLabel"></label>
            <input id="phone" type="tel" required>
        </div>

        <div class="form-group">
            <label for="segment" id="segmentLabel"></label>
            <select id="segment" required></select>
        </div>

        <div class="form-group">
            <label for="address" id="addressLabel"></label>
            <input id="address" type="text">
        </div>

        <span class="section-title" id="t2"></span>
        <div class="services-grid" id="services"></div>

        <span class="section-title" id="t3"></span>
        <div class="form-group">
            <label for="notes" id="notesLabel"></label>
            <textarea id="notes" rows="3"></textarea>
        </div>

        <div class="btn-group">
            <button type="button" class="btn btn-service" id="b1" onclick="sendWhatsApp('service')"></button>
            <button type="button" class="btn btn-estimate" id="b2" onclick="sendWhatsApp('estimate')"></button>
        </div>
    </form>
</div>

<div class="footer" id="footText"></div>

<script>
    const CONFIG = {
        whatsappNumbers: { service: '526121673200', estimate: '526122198325' }
    };

    const servicesList = {
        en: [
            '01. Air Conditioning Maintenance', '02. Air Conditioning Installation', '03. Interior & Exterior Painting',
            '04. Waterproofing Services', '05. Flooring Installation', '06. Electrical Repairs',
            '07. New Electrical Installations', '08. Plumbing Services', '09. CCTV Security Systems',
            '10. Electric Fence Installation', '11. Aluminum Works', '12. Metal Fabrication',
            '13. Drywall Installation', '14. Custom Carpentry', '15. Blinds & Shades',
            '16. Leak Detection & Repair', '17. Water Heater Installation', '18. General Maintenance',
            '19. Solar Panel Installation', '20. Professional Cleaning', '21. Anti-Vandal Security Window Film'
        ],
        es: [
            '01. Mantenimiento de Aire Acondicionado', '02. Instalación de Aire Acondicionado', '03. Pintura Interior y Exterior',
            '04. Impermeabilización', '05. Instalación de Pisos', '06. Reparaciones Eléctricas',
            '07. Instalaciones Eléctricas Nuevas', '08. Servicios de Plomería', '09. Sistemas de Cámaras CCTV',
            '10. Instalación de Cerco Eléctrico', '11. Trabajos en Aluminio', '12. Herrería y Fabricación Metálica',
            '13. Instalación de Drywall / Tablaroca', '14. Carpintería Residencial y Comercial', '15. Persianas y Cortinas',
            '16. Detección y Reparación de Fugas', '17. Instalación de Boilers / Calentadores', '18. Mantenimiento General',
            '19. Instalación de Paneles Solares', '20. Limpieza Profesional', '21. Venta e Instalación de Película de Seguridad'
        ]
    };

    const ui = {
        en: {
            t1: 'Client Information', t2: 'Services', t3: 'Project Details',
            pName: 'Full Name', pPhone: 'Phone Number', pAddr: 'Job Address', pNotes: 'How can we help?',
            segs: ['Residential', 'Commercial', 'Industrial'],
            b1: 'Request Service', b2: 'Request Estimate',
            foot: '© 2026 BAJA PRO SERVICES • Licensed & Insured'
        },
        es: {
            t1: 'Datos del Cliente', t2: 'Servicios', t3: 'Detalles del Proyecto',
            pName: 'Nombre Completo', pPhone: 'Teléfono', pAddr: 'Dirección del Proyecto', pNotes: '¿En qué podemos ayudarte?',
            segs: ['Residencial', 'Comercial', 'Industrial'],
            b1: 'Solicitar Servicio', b2: 'Solicitar Presupuesto',
            foot: '© 2026 BAJA PRO SERVICES • Licenciados y Asegurados'
        }
    };

    let currentLang = 'en';

    function setLang(lang) {
        currentLang = lang;
        const d = ui[lang];
        
        document.getElementById('lang-en').classList.toggle('active', lang === 'en');
        document.getElementById('lang-es').classList.toggle('active', lang === 'es');

        document.getElementById('t1').textContent = d.t1;
        document.getElementById('t2').textContent = d.t2;
        document.getElementById('t3').textContent = d.t3;
        document.getElementById('nameLabel').textContent = d.pName;
        document.getElementById('phoneLabel').textContent = d.pPhone;
        document.getElementById('addressLabel').textContent = d.pAddr;
        document.getElementById('notesLabel').textContent = d.pNotes;
        document.getElementById('b1').textContent = d.b1;
        document.getElementById('b2').textContent = d.b2;
        document.getElementById('footText').textContent = d.foot;

        const seg = document.getElementById('segment');
        seg.innerHTML = d.segs.map(s => `<option value="${s}">${s}</option>`).join('');

        const grid = document.getElementById('services');
        grid.innerHTML = servicesList[lang].map(s => `
            <label class="service-item">
                <input type="checkbox" value="${s}">
                <span>${s}</span>
            </label>
        `).join('');
    }

    function sendWhatsApp(type) {
        const name = document.getElementById('name').value;
        const phone = document.getElementById('phone').value;
        if(!name || !phone) return alert(currentLang === 'en' ? 'Name and Phone are required' : 'Nombre y Teléfono son requeridos');

        const selected = [...document.querySelectorAll('#services input:checked')].map(i => i.value);
        const notes = document.getElementById('notes').value;
        
        let msg = `*BAJA PRO SERVICES*\n*Cliente:* ${name}\n*Tel:* ${phone}\n*Servicios:* ${selected.length > 0 ? selected.join(', ') : 'No especificado'}\n*Notas:* ${notes}`;
        
        window.open(`https://wa.me/${CONFIG.whatsappNumbers[type]}?text=${encodeURIComponent(msg)}`, '_blank');
    }

    setLang('en');
</script>
</body>
</html>
